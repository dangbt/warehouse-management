name: Deploy Web

on:
  push:
    branches: [main, develop]
    paths:
      - apps/web/**
      - packages/**
      - .github/workflows/deploy-web.yml
  workflow_dispatch:

env:
  TURBO_API: ${{ github.ref == 'refs/heads/develop' && 'http://127.0.0.1:8585' || '' }}
  TURBO_TEAM: ${{ github.ref == 'refs/heads/develop' && 'warehouse-management' || '' }}
  TURBO_TOKEN: ${{ github.ref == 'refs/heads/develop' && secrets.TURBO_TOKEN || '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Turborepo Remote Cache
        if: github.ref == 'refs/heads/develop'
        uses: brunojppb/turbo-cache-server@4.0.3
        env:
          PORT: "8585"
          OTEL_SDK_DISABLED: "true"
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          S3_BUCKET_NAME: ${{ secrets.TURBO_CACHE_BUCKET }}
          S3_REGION: "auto"
          S3_ACCESS_KEY: ${{ secrets.TURBO_CACHE_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.TURBO_CACHE_SECRET_KEY }}
          S3_ENDPOINT: ${{ secrets.TURBO_CACHE_ENDPOINT }}

      - run: npm ci

      - name: Build web
        run: npx turbo build --filter=@wms/web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
